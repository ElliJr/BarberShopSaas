<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento Seguro - Agenda Fácil</title>
    <script src="https://sdk.mercadopago.com/js/v2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: #121212;
            color: white;
            font-family: 'Inter', sans-serif;
        }

        .card-dark {
            background: #1E1E1E;
            border: 1px solid #2D2D2D;
        }

        .mp-input {
            background: #2D2D2D;
            border: 1px solid #444;
            border-radius: 12px;
            height: 48px;
            padding: 10px;
        }

        input,
        select {
            background: #2D2D2D !important;
            color: white !important;
            border: 1px solid #444 !important;
            border-radius: 12px;
            padding: 12px;
            width: 100%;
            outline: none;
        }

        input:focus {
            border-color: #22d3ee !important;
        }

        .btn-cyan {
            background: linear-gradient(135deg, #0891b2, #1e3a8a);
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body class="p-4 flex items-center justify-center min-h-screen">

    <div class="max-w-md w-full card-dark rounded-[2.5rem] shadow-2xl overflow-hidden border border-white/5">
        <div class="p-8 text-center border-b border-white/5">
            <h1 class="text-xl font-bold italic">Agenda <span class="text-cyan-400">Fácil</span></h1>
            <p id="plano-nome" class="text-gray-500 text-[10px] uppercase tracking-widest mt-1">Carregando plano...</p>
        </div>

        <form id="form-checkout" class="p-8 space-y-4">
            <div class="bg-cyan-400/5 p-6 rounded-3xl border border-cyan-400/20 mb-6 text-center">
                <p class="text-gray-500 text-[10px] uppercase font-bold">Total a pagar</p>
                <h2 id="valor-display" class="text-4xl font-bold text-cyan-400">R$ 0,00</h2>
            </div>

            <div class="space-y-1">
                <label class="text-[10px] text-gray-500 uppercase font-bold">Número do Cartão</label>
                <div id="cardNumberId" class="mp-input"></div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="space-y-1">
                    <label class="text-[10px] text-gray-500 uppercase font-bold">Expiração</label>
                    <div id="expirationDateId" class="mp-input"></div>
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] text-gray-500 uppercase font-bold">CVV</label>
                    <div id="securityCodeId" class="mp-input"></div>
                </div>
            </div>

            <input type="text" id="form-checkout__cardholderName" placeholder="Nome no Cartão" required />
            <input type="email" id="form-checkout__cardholderEmail" placeholder="E-mail" required />

            <div class="grid grid-cols-3 gap-2">
                <select id="form-checkout__identificationType"></select>
                <input type="text" id="form-checkout__identificationNumber" placeholder="CPF/CNPJ" class="col-span-2"
                    required />
            </div>

            <select id="form-checkout__issuer" class="hidden"></select>
            <select id="form-checkout__installments"></select>

            <button type="submit" id="form-checkout__submit"
                class="btn-cyan w-full text-black font-bold py-5 rounded-2xl uppercase tracking-widest text-xs mt-6 transition hover:brightness-110 active:scale-95 disabled:opacity-50">
                Finalizar Pagamento
            </button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        // IMPORTANTE: Adicionando o módulo de Functions
        import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-functions.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAa4sZN42xSCw1nggj5wi-_AsuzGMfBEYg",
            authDomain: "barbershopsaas-2af6c.firebaseapp.com",
            projectId: "barbershopsaas-2af6c",
            storageBucket: "barbershopsaas-2af6c.firebasestorage.app",
            messagingSenderId: "939177796204",
            appId: "1:939177796204:web:85557a0c3665721cd8ae49"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const functions = getFunctions(app);

        // 1. Captura os dados da URL
        const params = new URLSearchParams(window.location.search);
        const valorOriginal = params.get('amount') || "0.00";
        const plano = params.get('plan') || "Plano Profissional";

        document.getElementById('valor-display').innerText = `R$ ${valorOriginal.replace('.', ',')}`;
        document.getElementById('plano-nome').innerText = plano;

        const iniciarMercadoPago = () => {
            const mp = new MercadoPago('APP_USR-77f18003-2f39-494a-8a4b-1f520924c239'); // Use sua Public Key (APP_USR-...)
            
            const cardForm = mp.cardForm({
                amount: valorOriginal,
                iframe: true,
                form: {
                    id: "form-checkout",
                    cardNumber: { id: "cardNumberId", placeholder: "0000 0000 0000 0000" },
                    expirationDate: { id: "expirationDateId", placeholder: "MM/AA" },
                    securityCode: { id: "securityCodeId", placeholder: "123" },
                    cardholderName: { id: "form-checkout__cardholderName" },
                    issuer: { id: "form-checkout__issuer" },
                    installments: { id: "form-checkout__installments" },
                    identificationType: { id: "form-checkout__identificationType" },
                    identificationNumber: { id: "form-checkout__identificationNumber" },
                    cardholderEmail: { id: "form-checkout__cardholderEmail" },
                },
                callbacks: {
                    onFormMounted: error => {
                        if (error) return console.warn("Erro ao montar MP: ", error);
                        console.log("Mercado Pago pronto.");
                    },
                    onSubmit: async event => {
                        event.preventDefault();

                        const btn = document.getElementById("form-checkout__submit");
                        btn.innerText = "PROCESSANDO PAGAMENTO...";
                        btn.disabled = true;

                        try {
                            const formData = cardForm.getCardFormData();

                            // --- CHAMADA DO BACKEND (CLOUDFUNCTION) ---
                            const processarPagamento = httpsCallable(functions, 'processarPagamento');

                            const result = await processarPagamento({
                                amount: valorOriginal,
                                token: formData.token,
                                description: plano,
                                installments: formData.installments,
                                payment_method_id: formData.payment_method_id,
                                issuer_id: formData.issuer_id,
                                email: formData.cardholderEmail,
                                identificationType: formData.identificationType,
                                identificationNumber: formData.identificationNumber
                            });

                            // Resposta da Function
                            const respostaMP = result.data;

                            if (respostaMP.success) {
                                // Se o backend retornou sucesso, redireciona para a tela de confirmação
                                window.location.href = `sucesso.html?id=${respostaMP.id}&valor=${valorOriginal}&plan=${plano}`;
                            } else {
                                // Se o pagamento foi recusado (ex: sem saldo)
                                alert(`Pagamento não aprovado: ${respostaMP.status}. Verifique seu cartão.`);
                                btn.innerText = "Tentar Novamente";
                                btn.disabled = false;
                            }

                        } catch (e) {
                            console.error("Erro na comunicação com o servidor:", e);
                            alert("Erro técnico ao processar. Tente novamente mais tarde.");
                            btn.innerText = "Finalizar Pagamento";
                            btn.disabled = false;
                        }
                    }
                }
            });
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                setTimeout(iniciarMercadoPago, 1000);
            } else {
                window.location.href = "login.html";
            }
        });
    </script>
</body>

</html>
